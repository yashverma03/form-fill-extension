<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application — Extension Test Form</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>Software Engineer — Application</h1>
      </header>

      <form id="job-application" action="#" method="post" novalidate>
        <!-- ── Identity ─────────────────────────────────────────────── -->
        <section aria-labelledby="section-personal">
          <h2 id="section-personal">Personal Information</h2>

          <div class="field-row">
            <div class="field">
              <label class="required" for="first-name">First Name</label>
              <input
                type="text"
                id="first-name"
                name="first_name"
                autocomplete="given-name"
              />
            </div>
            <div class="field">
              <label class="required" for="last-name">Last Name</label>
              <input
                type="text"
                id="last-name"
                name="last_name"
                autocomplete="family-name"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="legal-name">Legal Name / Full Name</label>
              <input type="text" id="legal-name" name="legal_name" />
            </div>
            <div class="field">
              <label for="preferred-name">Preferred Name</label>
              <input type="text" id="preferred-name" name="preferred_name" />
            </div>
          </div>

          <div class="field">
            <label for="middle-name">Middle Name</label>
            <input type="text" id="middle-name" name="middle_name" />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="dob">Date of Birth</label>
              <input type="text" id="dob" name="dob" placeholder="DD/MM/YYYY" />
            </div>
            <div class="field">
              <label for="marital-status">Marital Status</label>
              <select id="marital-status" name="marital_status">
                <option value="">Select</option>
                <option value="Single">Single</option>
                <option value="Married">Married</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="gender">Gender</label>
            <div
              class="radio-group"
              id="gender"
              role="radiogroup"
              aria-label="Gender"
            >
              <label
                ><input type="radio" name="gender" value="Male" /> Male</label
              >
              <label
                ><input type="radio" name="gender" value="Female" />
                Female</label
              >
              <label
                ><input type="radio" name="gender" value="Prefer not to say" />
                Prefer not to say</label
              >
            </div>
          </div>

          <div class="field">
            <label for="pronouns">Preferred Pronouns</label>
            <input
              type="text"
              id="pronouns"
              name="pronouns"
              placeholder="e.g. She/Her"
            />
          </div>
        </section>

        <!-- ── Contact ──────────────────────────────────────────────── -->
        <section aria-labelledby="section-contact">
          <h2 id="section-contact">Contact Details</h2>

          <div class="field">
            <label class="required" for="email">Email Address</label>
            <input type="email" id="email" name="email" autocomplete="email" />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" autocomplete="tel" />
            </div>
            <div class="field">
              <label for="mobile-type">Mobile Type</label>
              <select id="mobile-type" name="mobile_type">
                <option value="">Select type</option>
                <option value="Mobile">Mobile</option>
                <option value="Home">Home</option>
                <option value="Work">Work</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Preferred Contact Method</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Preferred contact method"
            >
              <label
                ><input type="radio" name="contact_method" value="Email" />
                Email</label
              >
              <label
                ><input type="radio" name="contact_method" value="Phone" />
                Phone</label
              >
            </div>
          </div>
        </section>

        <!-- ── Location ─────────────────────────────────────────────── -->
        <section aria-labelledby="section-location">
          <h2 id="section-location">Location &amp; Address</h2>

          <div class="field-row">
            <div class="field">
              <label for="country">Country</label>
              <select id="country" name="country">
                <option value="">Select country</option>
                <option value="India">India</option>
                <option value="United States">United States</option>
                <option value="United Kingdom">United Kingdom</option>
              </select>
            </div>
            <div class="field">
              <label for="nationality">Nationality</label>
              <input type="text" id="nationality" name="nationality" />
            </div>
          </div>

          <div class="field">
            <label for="current-location">Current City / Location</label>
            <input type="text" id="current-location" name="current_location" />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="city">City</label>
              <input type="text" id="city" name="city" />
            </div>
            <div class="field">
              <label for="state">State / Province</label>
              <input type="text" id="state" name="state" />
            </div>
          </div>

          <div class="field">
            <label for="address-1">Address Line 1</label>
            <input type="text" id="address-1" name="address_1" />
          </div>

          <div class="field">
            <label for="address-2">Address Line 2</label>
            <input type="text" id="address-2" name="address_2" />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="pin-code">Pin Code / Zip Code</label>
              <input type="text" id="pin-code" name="pin_code" />
            </div>
            <div class="field">
              <label for="full-address">Full Address</label>
              <input type="text" id="full-address" name="full_address" />
            </div>
          </div>
        </section>

        <!-- ── Professional ─────────────────────────────────────────── -->
        <section aria-labelledby="section-professional">
          <h2 id="section-professional">Professional Background</h2>

          <div class="field-row">
            <div class="field">
              <label for="current-company">Current Company</label>
              <input type="text" id="current-company" name="current_company" />
            </div>
            <div class="field">
              <label for="job-title">Current Job Title</label>
              <input type="text" id="job-title" name="job_title" />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="experience">Years of Experience</label>
              <select id="experience" name="experience">
                <option value="">Select</option>
                <option value="1">1 year</option>
                <option value="2">2 years</option>
                <option value="3">3 years</option>
                <option value="4">4 years</option>
                <option value="5">5 years</option>
              </select>
            </div>
            <div class="field">
              <label for="experience-number">Total Experience (in years)</label>
              <input
                type="number"
                id="experience-number"
                name="experience_years"
                min="0"
              />
            </div>
          </div>

          <div class="field">
            <label>Primary Skills</label>
            <div
              class="checkbox-group"
              role="group"
              aria-label="Primary skills"
            >
              <label
                ><input type="checkbox" name="skills" value="JavaScript" />
                JavaScript</label
              >
              <label
                ><input type="checkbox" name="skills" value="TypeScript" />
                TypeScript</label
              >
            </div>
            <span class="tag tag--extra">extra</span>
          </div>
        </section>

        <!-- ── Compensation ───────────────────────────────────────────── -->
        <section aria-labelledby="section-compensation">
          <h2 id="section-compensation">Compensation &amp; Availability</h2>

          <div class="field-row">
            <div class="field">
              <label for="current-ctc-lpa">Current CTC (in LPA)</label>
              <input
                type="number"
                id="current-ctc-lpa"
                name="current_ctc_lpa"
                min="0"
                step="0.1"
              />
            </div>
            <div class="field">
              <label for="current-ctc">Current CTC</label>
              <input
                type="number"
                id="current-ctc"
                name="current_ctc"
                min="0"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="expected-ctc-lpa">Expected CTC (in LPA)</label>
              <input
                type="number"
                id="expected-ctc-lpa"
                name="expected_ctc_lpa"
                min="0"
                step="0.1"
              />
            </div>
            <div class="field">
              <label for="expected-ctc">Expected CTC</label>
              <input
                type="number"
                id="expected-ctc"
                name="expected_ctc"
                min="0"
              />
            </div>
          </div>

          <div class="field">
            <label for="competing-offer">Competing Offer CTC (in LPA)</label>
            <input
              type="number"
              id="competing-offer"
              name="competing_offer_ctc"
              min="0"
              step="0.1"
            />
          </div>

          <div class="field">
            <label>Is your salary negotiable?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Salary negotiable"
            >
              <label
                ><input type="radio" name="negotiable" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="negotiable" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="notice-period">Notice Period (days)</label>
              <input
                type="number"
                id="notice-period"
                name="notice_period"
                min="0"
              />
            </div>
            <div class="field">
              <label for="date-available">Earliest Start Date</label>
              <input
                type="text"
                id="date-available"
                name="date_available"
                placeholder="DD/MM/YYYY"
              />
            </div>
          </div>

          <div class="field">
            <label for="notice-period-select">When can you join?</label>
            <select id="notice-period-select" name="joining_time">
              <option value="">Select</option>
              <option value="Immediate">Immediate</option>
              <option value="30">30 days</option>
              <option value="60">60 days</option>
            </select>
          </div>

          <div class="field">
            <label>Is notice period negotiable?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Notice period negotiable"
            >
              <label
                ><input type="radio" name="notice_negotiable" value="Yes" />
                Yes</label
              >
              <label
                ><input type="radio" name="notice_negotiable" value="No" />
                No</label
              >
            </div>
          </div>
        </section>

        <!-- ── Links ────────────────────────────────────────────────── -->
        <section aria-labelledby="section-links">
          <h2 id="section-links">Links &amp; Portfolio</h2>

          <div class="field">
            <label for="linkedin">LinkedIn Profile URL</label>
            <input type="url" id="linkedin" name="linkedin" />
          </div>

          <div class="field">
            <label for="github">GitHub Profile URL</label>
            <input type="url" id="github" name="github" />
          </div>

          <div class="field">
            <label for="portfolio">Portfolio / Personal Website</label>
            <input type="url" id="portfolio" name="portfolio" />
          </div>

          <div class="field">
            <label for="leetcode">LeetCode Profile URL</label>
            <input type="url" id="leetcode" name="leetcode" />
          </div>
        </section>

        <!-- ── Work preferences ─────────────────────────────────────── -->
        <section aria-labelledby="section-preferences">
          <h2 id="section-preferences">Work Preferences</h2>

          <div class="field">
            <label>Are you willing to relocate?</label>
            <div class="radio-group" role="radiogroup" aria-label="Relocation">
              <label
                ><input type="radio" name="relocate" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="relocate" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label for="employment-type">Employment Type</label>
            <select id="employment-type" name="employment_type">
              <option value="">Select</option>
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Contract">Contract</option>
            </select>
          </div>

          <div class="field">
            <label>Are you willing to travel?</label>
            <div class="radio-group" role="radiogroup" aria-label="Travel">
              <label
                ><input type="radio" name="travel" value="Yes" /> Yes</label
              >
              <label><input type="radio" name="travel" value="No" /> No</label>
            </div>
          </div>

          <div class="field">
            <label for="shift">Preferred Work Shift</label>
            <select id="shift" name="shift">
              <option value="">Select</option>
              <option value="Day">Day</option>
              <option value="Night">Night</option>
            </select>
          </div>

          <div class="field">
            <label>Preferred Work Mode</label>
            <div class="radio-group" role="radiogroup" aria-label="Work mode">
              <label
                ><input type="radio" name="work_mode" value="Remote" />
                Remote</label
              >
              <label
                ><input type="radio" name="work_mode" value="Hybrid" />
                Hybrid</label
              >
            </div>
            <span class="tag tag--extra">extra</span>
          </div>
        </section>

        <!-- ── Compliance ───────────────────────────────────────────── -->
        <section aria-labelledby="section-compliance">
          <h2 id="section-compliance">Work Authorization &amp; Compliance</h2>

          <div class="field">
            <label>Are you legally authorized to work in this country?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Work authorization"
            >
              <label
                ><input type="radio" name="work_auth" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="work_auth" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Do you require visa sponsorship?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Visa sponsorship"
            >
              <label
                ><input type="radio" name="sponsorship" value="Yes" />
                Yes</label
              >
              <label
                ><input type="radio" name="sponsorship" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Visa / Work Permit Status</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Visa work permit status"
            >
              <label
                ><input type="radio" name="visa_status" value="Yes" />
                Yes</label
              >
              <label
                ><input type="radio" name="visa_status" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Do you have any conflict of interest?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Conflict of interest"
            >
              <label
                ><input type="radio" name="conflict" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="conflict" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Do you have a relative working at this company?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Relative at company"
            >
              <label
                ><input type="radio" name="relative" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="relative" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Are you bound by a non-compete agreement?</label>
            <div class="radio-group" role="radiogroup" aria-label="Non-compete">
              <label
                ><input type="radio" name="non_compete" value="Yes" />
                Yes</label
              >
              <label
                ><input type="radio" name="non_compete" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Have you ever been convicted of a felony?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Criminal record"
            >
              <label
                ><input type="radio" name="criminal" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="criminal" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Do you hold a security clearance?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Security clearance"
            >
              <label
                ><input type="radio" name="clearance" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="clearance" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label>Have you worked here before?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Previous employee"
            >
              <label
                ><input type="radio" name="rehire" value="Yes" /> Yes</label
              >
              <label><input type="radio" name="rehire" value="No" /> No</label>
            </div>
          </div>

          <div class="field">
            <label>
              <input type="checkbox" name="terms" value="accepted" />
              I confirm that the information provided is accurate
            </label>
          </div>
        </section>

        <!-- ── EEO voluntary ────────────────────────────────────────── -->
        <section aria-labelledby="section-eeo">
          <h2 id="section-eeo">Voluntary Disclosure (EEO)</h2>

          <div class="field">
            <label for="ethnicity">Ethnicity / Race</label>
            <select id="ethnicity" name="ethnicity">
              <option value="">Select</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>

          <div class="field">
            <label>Are you a veteran?</label>
            <div
              class="radio-group"
              role="radiogroup"
              aria-label="Veteran status"
            >
              <label
                ><input type="radio" name="veteran" value="Yes" /> Yes</label
              >
              <label><input type="radio" name="veteran" value="No" /> No</label>
            </div>
          </div>

          <div class="field">
            <label>Do you have a disability?</label>
            <div class="radio-group" role="radiogroup" aria-label="Disability">
              <label
                ><input type="radio" name="disability" value="Yes" /> Yes</label
              >
              <label
                ><input type="radio" name="disability" value="No" /> No</label
              >
            </div>
          </div>

          <div class="field">
            <label for="orientation">Sexual Orientation</label>
            <select id="orientation" name="orientation">
              <option value="">Select</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>
        </section>

        <!-- ── Education ────────────────────────────────────────────── -->
        <section aria-labelledby="section-education">
          <h2 id="section-education">Education</h2>

          <div class="field-row">
            <div class="field">
              <label for="degree">Highest Degree</label>
              <input type="text" id="degree" name="degree" />
            </div>
            <div class="field">
              <label for="university">University / College</label>
              <input type="text" id="university" name="university" />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="major">Field of Study / Major</label>
              <input type="text" id="major" name="major" />
            </div>
            <div class="field">
              <label for="grad-year">Graduation Year</label>
              <input
                type="number"
                id="grad-year"
                name="graduation_year"
                min="1950"
                max="2030"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="gpa">GPA / CGPA</label>
              <input type="text" id="gpa" name="gpa" />
            </div>
            <div class="field">
              <label for="certification">Certifications</label>
              <input type="text" id="certification" name="certification" />
            </div>
          </div>
        </section>

        <!-- ── Application & behavioral ─────────────────────────────── -->
        <section aria-labelledby="section-behavioral">
          <h2 id="section-behavioral">Application Questions</h2>

          <div class="field">
            <label for="referral-source"
              >How did you hear about this role?</label
            >
            <select id="referral-source" name="referral_source">
              <option value="">Select source</option>
              <option value="Referral">Referral</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Job Board">Job Board</option>
            </select>
          </div>

          <div class="field">
            <label for="why-leaving"
              >Why are you leaving your current job?</label
            >
            <textarea id="why-leaving" name="why_leaving" rows="3"></textarea>
          </div>

          <div class="field">
            <label for="why-hire">Why should we hire you?</label>
            <textarea id="why-hire" name="why_hire" rows="3"></textarea>
          </div>

          <div class="field">
            <label for="conflict"
              >Tell me about a conflict you had with a colleague. How did you
              resolve it?</label
            >
            <textarea id="conflict" name="conflict_story" rows="3"></textarea>
          </div>

          <div class="field">
            <label for="achievement"
              >Describe a project you built that had the biggest impact.</label
            >
            <textarea id="achievement" name="achievement" rows="3"></textarea>
          </div>

          <div class="field">
            <label for="goals"
              >Where do you see yourself in the next 5 years?</label
            >
            <textarea id="goals" name="goals" rows="3"></textarea>
          </div>

          <div class="field">
            <label for="references">Professional References</label>
            <textarea
              id="references"
              name="references"
              rows="2"
              placeholder="Name, contact"
            ></textarea>
            <span class="tag tag--extra">extra</span>
          </div>
        </section>

        <div class="actions">
          <button type="submit">Submit Application</button>
          <button type="reset">Clear Form</button>
        </div>
      </form>
    </div>
  </body>
</html>
